<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ma page simple</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      color: #222;
    }

    header {
      background-color: #f1277b;
      color: white;
      text-align: center;
      padding: 30px;
    }

    main {
      max-width: 800px;
      margin: 40px auto;
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin: 0;
    }

    button {
      background-color: #f1277b;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #de91da;
    }

  </style>
</head>
<body>
  <header>
    <h1>Une super page pour une super star</h1>
    <p>Une page HTML dans la simplicité</p>
  </header>

  <main>
    <button>Surprise !!</button>
  </main>

</body>
</html>
