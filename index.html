    <script>
      const title = document.querySelector(".museum-title");
      let titleFitFrame;

      const fitMuseumTitle = () => {
        cancelAnimationFrame(titleFitFrame);

        titleFitFrame = requestAnimationFrame(() => {
          title.style.fontSize = "100px";
          const range = document.createRange();
          range.selectNodeContents(title);
          const titleWidth = range.getBoundingClientRect().width;
          range.detach();

          if (titleWidth > 0) {
            title.style.fontSize = `${
              (document.documentElement.clientWidth / titleWidth) * 100
            }px`;
          }
        });
      };

      window.addEventListener("resize", fitMuseumTitle);
      fitMuseumTitle();

      if (document.fonts) {
        document.fonts.ready.then(fitMuseumTitle);
      }
    </script>
